<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../animations.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#F0FBFE;padding:20px;display:flex;flex-direction:column;gap:10px;}
.label{font-family:'JetBrains Mono',monospace;font-size:9px;color:#A6CEDF;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}

/* Scale bars */
.scale{display:flex;gap:6px;align-items:flex-end;}
.bar{background:linear-gradient(to top,#26C0F8,#6DD5FA);border-radius:2px;flex-shrink:0;}
.tick{font-size:8px;color:#A6CEDF;font-family:'JetBrains Mono',monospace;text-align:center;margin-top:4px;}

/* Radius demos */
.r-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.r-box{background:#fff;border:1.5px solid rgba(38,192,248,0.25);width:44px;height:28px;}
.r-info{font-family:'JetBrains Mono',monospace;font-size:10px;color:#05678A;}
.r-val{font-size:9px;color:#A6CEDF;}

/* Shadow demos */
.s-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.s-box{background:#fff;border-radius:8px;width:80px;height:40px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:#A6CEDF;}
</style>
</head><body>
<div class="ma-fade-up">
  <div class="label">// Spacing scale (4px base)</div>
  <div class="scale">
    <div><div class="bar" style="width:4px;height:4px"></div><div class="tick">4</div></div>
    <div><div class="bar" style="width:8px;height:8px"></div><div class="tick">8</div></div>
    <div><div class="bar" style="width:12px;height:12px"></div><div class="tick">12</div></div>
    <div><div class="bar" style="width:16px;height:16px"></div><div class="tick">16</div></div>
    <div><div class="bar" style="width:20px;height:20px"></div><div class="tick">20</div></div>
    <div><div class="bar" style="width:24px;height:24px"></div><div class="tick">24</div></div>
    <div><div class="bar" style="width:32px;height:32px"></div><div class="tick">32</div></div>
    <div><div class="bar" style="width:40px;height:40px"></div><div class="tick">40</div></div>
    <div><div class="bar" style="width:48px;height:48px"></div><div class="tick">48</div></div>
    <div><div class="bar" style="width:64px;height:64px"></div><div class="tick">64</div></div>
    <div><div class="bar" style="width:80px;height:80px"></div><div class="tick">80</div></div>
  </div>
</div>
<div class="ma-fade-up ma-delay-1">
  <div class="label">// Border radius</div>
  <div class="r-row">
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div class="r-box" style="border-radius:4px"></div><div class="r-info">sm<br><span class="r-val">4px</span></div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div class="r-box" style="border-radius:8px"></div><div class="r-info">md<br><span class="r-val">8px</span></div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div class="r-box" style="border-radius:12px"></div><div class="r-info">lg<br><span class="r-val">12px</span></div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div class="r-box" style="border-radius:16px"></div><div class="r-info">xl<br><span class="r-val">16px</span></div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div class="r-box" style="border-radius:24px"></div><div class="r-info">2xl<br><span class="r-val">24px</span></div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div class="r-box" style="border-radius:999px"></div><div class="r-info">pill<br><span class="r-val">999</span></div></div>
  </div>
</div>
<div class="ma-fade-up ma-delay-2">
  <div class="label">// Light theme shadows</div>
  <div class="s-row">
    <div class="s-box" style="box-shadow:0 1px 4px rgba(5,103,138,0.06),0 4px 16px rgba(5,103,138,0.04)">light-sm</div>
    <div class="s-box" style="box-shadow:0 4px 24px rgba(5,103,138,0.10),0 1px 4px rgba(5,103,138,0.06)">light-md</div>
    <div class="s-box" style="box-shadow:0 12px 48px rgba(5,103,138,0.14),0 4px 12px rgba(5,103,138,0.08)">light-lg</div>
    <div class="s-box" style="box-shadow:0 0 32px rgba(38,192,248,0.18);color:#26C0F8">cyan</div>
    <div class="s-box" style="background:#010D14;box-shadow:0 0 24px rgba(241,143,1,0.25);color:#F18F01">accent</div>
  </div>
</div>
</body></html>
