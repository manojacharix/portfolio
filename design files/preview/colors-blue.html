<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--color-grey-950); font-family: var(--font-body); padding: 20px; }
.row { display:flex; gap:2px; margin-bottom:6px; }
.swatch { flex:1; height:52px; display:flex; align-items:flex-end; padding:4px 5px; }
.swatch span { font-size:10px; font-weight:600; letter-spacing:0.04em; line-height:1; }
.group-label { font-size:10px; color: var(--fg-muted); font-family: var(--font-body); margin-bottom:6px; letter-spacing:0.08em; text-transform:uppercase; }
</style>
</head><body>
<div class="group-label">Primary / Blue</div>
<div class="row">
  <div class="swatch" style="background:#040B11"><span style="color:#194E71">950</span></div>
  <div class="swatch" style="background:#081A26"><span style="color:#206592">900</span></div>
  <div class="swatch" style="background:#11344B"><span style="color:#439BD5">800</span></div>
  <div class="swatch" style="background:#194E71"><span style="color:#75B6E0">700</span></div>
  <div class="swatch" style="background:#206592"><span style="color:#A3CEEB">600</span></div>
  <div class="swatch" style="background:#2980B9"><span style="color:#E6F2F9">500</span></div>
  <div class="swatch" style="background:#439BD5"><span style="color:#040B11">400</span></div>
  <div class="swatch" style="background:#75B6E0"><span style="color:#081A26">300</span></div>
  <div class="swatch" style="background:#A3CEEB"><span style="color:#11344B">200</span></div>
  <div class="swatch" style="background:#D1E7F5"><span style="color:#206592">100</span></div>
  <div class="swatch" style="background:#E6F2F9"><span style="color:#2980B9">50</span></div>
</div>
<div class="group-label">Primary / Light Blue</div>
<div class="row">
  <div class="swatch" style="background:#011A23"><span style="color:#05678A">950</span></div>
  <div class="swatch" style="background:#023345"><span style="color:#079ACF">900</span></div>
  <div class="swatch" style="background:#05678A"><span style="color:#6DD5FA">800</span></div>
  <div class="swatch" style="background:#079ACF"><span style="color:#C4EEFD">700</span></div>
  <div class="swatch" style="background:#26C0F8"><span style="color:#011A23">600</span></div>
  <div class="swatch" style="background:#6DD5FA"><span style="color:#023345">500</span></div>
  <div class="swatch" style="background:#89DCFB"><span style="color:#05678A">400</span></div>
  <div class="swatch" style="background:#A6E5FC"><span style="color:#079ACF">300</span></div>
  <div class="swatch" style="background:#C4EEFD"><span style="color:#079ACF">200</span></div>
  <div class="swatch" style="background:#E1F6FE"><span style="color:#079ACF">100</span></div>
  <div class="swatch" style="background:#F0FBFE"><span style="color:#26C0F8">50</span></div>
</div>
</body></html>
