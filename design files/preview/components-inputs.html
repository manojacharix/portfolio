<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../animations.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#F0FBFE;padding:24px;display:flex;flex-direction:column;gap:18px;max-width:380px;}
.label{font-family:'JetBrains Mono',monospace;font-size:9px;color:#A6CEDF;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:#05678A;letter-spacing:0.08em;text-transform:uppercase;}
.input{background:#fff;border:1.5px solid rgba(38,192,248,0.2);border-radius:5px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:#010D14;outline:none;transition:border-color 0.15s,box-shadow 0.15s;width:100%;}
.input::placeholder{color:#C4EEFD;}
.input:focus{border-color:#26C0F8;box-shadow:0 0 0 3px rgba(38,192,248,0.1);}
.input-error{border-color:#F87171;}
.hint{font-family:'JetBrains Mono',monospace;font-size:10px;color:#A6CEDF;letter-spacing:0.04em;}
.hint-error{color:#EF4444;}
.textarea{resize:vertical;min-height:72px;}
</style>
</head><body>
<div class="label">// Form inputs</div>
<div class="field ma-fade-up">
  <div class="field-label">Email</div>
  <input class="input" type="text" placeholder="manoj@example.com">
  <div class="hint">// No NDAs required to start a conversation</div>
</div>
<div class="field ma-fade-up ma-delay-1">
  <div class="field-label">Project brief</div>
  <textarea class="input textarea" placeholder="Tell me what you're building..."></textarea>
</div>
<div class="field ma-fade-up ma-delay-2">
  <div class="field-label">Error state</div>
  <input class="input input-error" value="bad-input@">
  <div class="hint hint-error">That doesn't look like a valid email.</div>
</div>
</body></html>
