<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../animations.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#F0FBFE;width:100%;height:300px;overflow:hidden;position:relative;display:flex;}
canvas{position:absolute;inset:0;width:100%;height:100%;}

.logo-row{display:flex;width:100%;height:100%;position:relative;z-index:2;}
.tile{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;position:relative;}
.tile-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap;}

/* Corner marks */
.corners{position:absolute;inset:10px;pointer-events:none;}
.corners::before,.corners::after{content:'';position:absolute;width:10px;height:10px;border-color:rgba(38,192,248,0.25);border-style:solid;}
.corners::before{top:0;left:0;border-width:1px 0 0 1px;}
.corners::after{bottom:0;right:0;border-width:0 1px 1px 0;}
</style>
</head><body>
<canvas id="c"></canvas>
<div class="logo-row">
  <div class="tile" style="background:rgba(240,251,254,0.95);border-right:1px solid rgba(38,192,248,0.12)">
    <div class="corners"></div>
    <img src="../assets/manoj_logo_full.svg" class="ma-float" style="height:20px;filter:brightness(0)" alt="logo on light">
    <div class="tile-label" style="color:#A6CEDF">Light bg - default</div>
  </div>
  <div class="tile" style="background:rgba(1,13,20,0.96);border-right:1px solid rgba(38,192,248,0.1)">
    <div class="corners"></div>
    <img src="../assets/manoj_logo_full.svg" class="ma-float" style="height:20px;filter:brightness(0) invert(1)" alt="logo on dark">
    <div class="tile-label" style="color:rgba(38,192,248,0.35)">Dark bg</div>
  </div>
  <div class="tile" style="background:linear-gradient(135deg,#011A23,#05678A);border-right:1px solid rgba(38,192,248,0.1)">
    <div class="corners"></div>
    <img src="../assets/manoj_logo_full.svg" class="ma-float" style="height:20px;filter:brightness(0) invert(1)" alt="logo on navy">
    <div class="tile-label" style="color:rgba(166,229,252,0.4)">Navy gradient</div>
  </div>
  <div class="tile" style="background:#26C0F8;border-right:1px solid rgba(255,255,255,0.15)">
    <div class="corners"></div>
    <img src="../assets/manoj_logo_full.svg" class="ma-float" style="height:20px;filter:brightness(0)" alt="logo on cyan">
    <div class="tile-label" style="color:rgba(1,26,35,0.45)">Cyan</div>
  </div>
  <div class="tile" style="background:#F18F01">
    <div class="corners"></div>
    <img src="../assets/manoj_logo_full.svg" class="ma-float" style="height:20px;filter:brightness(0)" alt="logo on yellow">
    <div class="tile-label" style="color:rgba(1,13,20,0.4)">Yellow</div>
  </div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
c.width=700;c.height=300;
let t=0;
(function draw(){
  ctx.clearRect(0,0,700,300);
  const g=ctx.createRadialGradient(350,150,0,350,150,400);
  g.addColorStop(0,'rgba(38,192,248,0.04)');
  g.addColorStop(1,'rgba(240,251,254,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,700,300);
  t+=0.01;requestAnimationFrame(draw);
})();
</script>
</body></html>
