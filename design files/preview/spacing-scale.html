<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--color-grey-950); padding:20px; display:flex; flex-direction:column; gap:12px; }
.label { font-size:10px; color:var(--color-grey-400); letter-spacing:0.08em; text-transform:uppercase; font-family:var(--font-body); margin-bottom:6px; }
.scale { display:flex; align-items:flex-end; gap:6px; }
.bar { background: var(--color-yellow-500); border-radius:2px; flex-shrink:0; }
.tick { font-size:10px; color:var(--color-grey-300); font-family:var(--font-body); text-align:center; margin-top:4px; }
.unit { font-size:9px; color:var(--color-grey-400); }
.pair { display:flex; align-items:center; gap:8px; }
.spc { background:var(--color-lightblue-800); border-radius:2px; }
.val { font-size:11px; color:var(--color-grey-200); font-family:monospace; }
.name { font-size:11px; color:var(--color-grey-400); }
</style>
</head><body>
<div class="label">Spacing Scale</div>
<div class="scale">
  <div><div class="bar" style="width:4px;height:4px"></div><div class="tick">1<br><span class="unit">4px</span></div></div>
  <div><div class="bar" style="width:8px;height:8px"></div><div class="tick">2<br><span class="unit">8px</span></div></div>
  <div><div class="bar" style="width:12px;height:12px"></div><div class="tick">3<br><span class="unit">12</span></div></div>
  <div><div class="bar" style="width:16px;height:16px"></div><div class="tick">4<br><span class="unit">16</span></div></div>
  <div><div class="bar" style="width:20px;height:20px"></div><div class="tick">5<br><span class="unit">20</span></div></div>
  <div><div class="bar" style="width:24px;height:24px"></div><div class="tick">6<br><span class="unit">24</span></div></div>
  <div><div class="bar" style="width:32px;height:32px"></div><div class="tick">8<br><span class="unit">32</span></div></div>
  <div><div class="bar" style="width:40px;height:40px"></div><div class="tick">10<br><span class="unit">40</span></div></div>
  <div><div class="bar" style="width:48px;height:48px"></div><div class="tick">12<br><span class="unit">48</span></div></div>
  <div><div class="bar" style="width:64px;height:64px"></div><div class="tick">16<br><span class="unit">64</span></div></div>
  <div><div class="bar" style="width:80px;height:80px"></div><div class="tick">20<br><span class="unit">80</span></div></div>
</div>
</body></html>
