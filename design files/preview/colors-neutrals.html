<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--color-grey-950); font-family: var(--font-body); padding: 20px; }
.row { display:flex; gap:2px; align-items:stretch; }
.swatch { flex:1; height:48px; display:flex; align-items:flex-end; padding:4px 6px; position:relative; }
.swatch span { font-size:10px; font-weight:600; letter-spacing:0.04em; line-height:1; }
.label { font-size:11px; color: var(--fg-muted); font-family: var(--font-body); margin-bottom:8px; letter-spacing:0.08em; text-transform:uppercase; }
</style>
</head><body>
<div class="label">Neutral / Grey</div>
<div class="row">
  <div class="swatch" style="background:#030303"><span style="color:#737373">950</span></div>
  <div class="swatch" style="background:#050505"><span style="color:#737373">900</span></div>
  <div class="swatch" style="background:#080808"><span style="color:#424242">800</span></div>
  <div class="swatch" style="background:#0D0D0D"><span style="color:#424242">700</span></div>
  <div class="swatch" style="background:#0F0F0F"><span style="color:#424242">600</span></div>
  <div class="swatch" style="background:#141414"><span style="color:#424242">500</span></div>
  <div class="swatch" style="background:#424242"><span style="color:#A1A1A1">400</span></div>
  <div class="swatch" style="background:#737373"><span style="color:#141414">300</span></div>
  <div class="swatch" style="background:#A1A1A1"><span style="color:#141414">200</span></div>
  <div class="swatch" style="background:#D1D1D1"><span style="color:#424242">100</span></div>
  <div class="swatch" style="background:#E8E8E8"><span style="color:#424242">50</span></div>
  <div class="swatch" style="background:#FFFFFF"><span style="color:#424242">W</span></div>
</div>
</body></html>
